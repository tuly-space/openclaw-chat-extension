<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Chat</title>
  <link rel="stylesheet" href="sidepanel.css" />
  <link rel="stylesheet" id="hljs-theme" href="hljs-dark.css" />
</head>
<body>
  <!-- Header -->
  <div id="header">
    <div id="header-title">
      <span id="status-dot" class="dot disconnected"></span>
      <span id="header-name">OpenClaw</span>
    </div>
    <div id="header-actions">
      <button id="btn-relay" class="icon-btn relay-btn" title="Toggle browser relay on current tab">
        <span id="relay-dot" class="relay-indicator off"></span>
        Relay
      </button>
      <button id="btn-history" class="icon-btn" title="Conversation history">🕐</button>
      <button id="btn-font-down" class="icon-btn font-size-btn" title="Smaller text">A-</button>
      <button id="btn-font-up" class="icon-btn font-size-btn" title="Larger text">A+</button>
      <button id="btn-theme" class="icon-btn" title="Toggle light/dark">🌙</button>
      <button id="btn-new" class="icon-btn" title="New conversation">✏️</button>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </div>
  </div>

  <!-- Relay tab title bar -->
  <div id="relay-tab-bar" class="hidden">
    <span id="relay-tab-favicon">🌐</span>
    <span id="relay-tab-title"></span>
  </div>

  <!-- Connection error banner -->
  <div id="error-banner" class="hidden">
    <span id="error-text"></span>
    <button id="btn-retry">Retry</button>
  </div>

  <!-- Settings panel (hidden by default) -->
  <div id="settings-panel" class="hidden">
    <div class="settings-row">
      <label>Gateway URL</label>
      <input id="input-url" type="text" placeholder="https://dash.tuly.space" />
    </div>
    <div class="settings-row">
      <label>Gateway Token</label>
      <input id="input-token" type="password" placeholder="paste token here" />
    </div>
    <div class="settings-row">
      <label>Agent ID</label>
      <input id="input-agent" type="text" placeholder="main" />
    </div>
    <div class="settings-row">
      <label>Relay Port</label>
      <input id="input-relay-port" type="number" placeholder="18792" min="1" max="65535" />
    </div>
    <div class="settings-actions">
      <button id="btn-save-settings">Save &amp; Connect</button>
      <button id="btn-cancel-settings">Cancel</button>
    </div>
    <div class="settings-hint">
      Token: <code>openclaw gateway status</code><br/>
      Relay requires OpenClaw node host running locally.
    </div>
  </div>

  <!-- History panel (slide-in overlay) -->
  <div id="history-panel" class="hidden">
    <div id="history-header">
      <span>Conversations</span>
      <button id="btn-history-close" class="icon-btn">✕</button>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- Chat messages -->
  <div id="messages"></div>

  <!-- Typing indicator -->
  <div id="typing-indicator" class="hidden">
    <span class="dot-pulse"></span>
    <span class="dot-pulse"></span>
    <span class="dot-pulse"></span>
  </div>

  <!-- Input area -->
  <div id="attachments-preview" class="hidden"></div>
  <div id="input-area">
    <button id="btn-attach" class="icon-btn" title="Attach file">📎</button>
    <input type="file" id="file-input" multiple accept="image/*,.txt,.md,.json,.csv,.log,.pdf" hidden />
    <textarea
      id="input-msg"
      placeholder="Message OpenClaw…"
      rows="3"
      maxlength="32000"
    ></textarea>
    <button id="btn-send" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M1.5 1.5l13 6.5-13 6.5v-5l9-1.5-9-1.5z"/>
      </svg>
    </button>
  </div>

  <script src="marked.min.js"></script>
  <script src="highlight.min.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
